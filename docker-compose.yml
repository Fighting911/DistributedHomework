version: '3.8'

# 启动: docker-compose up -d --build
# 停止: docker-compose down

services:

  # ── 数据库 ─────────────────────────────────────────
  mysql:
    image: mysql:8.0
    container_name: seckill-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seckill
    ports:
      - "3307:3306"    # 宿主机 3307，避免与本地 MySQL 冲突
    volumes:
      - mysql_data:/var/lib/mysql
      - ./user-service/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p123456"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seckill-net

  # ── 缓存 ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - seckill-net

  # ── 用户服务 实例1 ─────────────────────────────────
  user-service-1:
    build: ./user-service
    container_name: user-service-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: 8081
      INSTANCE_ID: user-service-1
    ports:
      - "8081:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # ── 用户服务 实例2 ─────────────────────────────────
  user-service-2:
    build: ./user-service
    container_name: user-service-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: 8081
      INSTANCE_ID: user-service-2
    ports:
      - "8082:8081"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # ── 商品服务 实例1 ─────────────────────────────────
  product-service-1:
    build: ./product-service
    container_name: product-service-1
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: 8082
      INSTANCE_ID: product-service-1
    ports:
      - "8083:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # ── 商品服务 实例2 ─────────────────────────────────
  product-service-2:
    build: ./product-service
    container_name: product-service-2
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      SPRING_DATA_REDIS_HOST: redis
      SERVER_PORT: 8082
      INSTANCE_ID: product-service-2
    ports:
      - "8086:8082"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - seckill-net

  # ── Nginx（负载均衡 + 动静分离）──────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: seckill-nginx
    ports:
      - "80:80"
    depends_on:
      - user-service-1
      - user-service-2
      - product-service-1
      - product-service-2
    networks:
      - seckill-net

networks:
  seckill-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
