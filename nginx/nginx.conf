user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" upstream: $upstream_addr';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    # =========================================================
    # 负载均衡：upstream 定义后端实例
    # 可切换算法：
    #   默认         → 轮询 (round-robin)
    #   ip_hash      → 按客户端IP哈希（同一IP总访问同一实例）
    #   least_conn   → 最少连接数
    # =========================================================
    upstream user_backend {
        # 算法一：轮询（默认，注释掉其他）
        server user-service-1:8081;
        server user-service-2:8081;

        # 算法二：IP Hash（取消注释以启用）
        # ip_hash;
        # server user-service-1:8081;
        # server user-service-2:8081;

        # 算法三：最少连接（取消注释以启用）
        # least_conn;
        # server user-service-1:8081;
        # server user-service-2:8081;
    }

    upstream product_backend {
        server product-service-1:8082;
        server product-service-2:8082;
    }

    server {
        listen       80;
        server_name  localhost;

        # =========================================================
        # 动静分离：静态文件直接由 Nginx 处理
        # =========================================================

        # 静态资源：直接从本地目录返回
        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;

            # 静态文件缓存（浏览器缓存 7 天）
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # CSS / JS / 图片 明确走静态
        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root  /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # =========================================================
        # 动态请求：反向代理到后端服务
        # =========================================================

        # 用户服务 API → 轮询分发到两个 user-service 实例
        location /api/user/ {
            proxy_pass         http://user_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;

            # 禁用动态接口缓存
            add_header Cache-Control "no-store";
        }

        # 商品服务 API → 分发到两个 product-service 实例
        location /api/product/ {
            proxy_pass         http://product_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;

            add_header Cache-Control "no-store";
        }

        # 健康检查接口
        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
