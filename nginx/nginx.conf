user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" upstream: $upstream_addr';

    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    upstream user_backend {
        server user-service-1:8081;
        server user-service-2:8081;
    }

    upstream product_backend {
        server product-service-1:8082;
        server product-service-2:8082;
    }

    server {
        listen       80;
        server_name  localhost;

        location / {
            root   /usr/share/nginx/html;
            index  index.html;
            try_files $uri $uri/ /index.html;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
            root  /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location /api/user/ {
            proxy_pass         http://user_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            add_header Cache-Control "no-store";
        }

        location /api/product/ {
            proxy_pass         http://product_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            add_header Cache-Control "no-store";
        }

        # 库存服务（秒杀入口）
        location /api/inventory/ {
            proxy_pass         http://inventory-service:8084;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            add_header Cache-Control "no-store";
        }

        # 订单服务
        location /api/order/ {
            proxy_pass         http://order-service:8085;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  10s;
            proxy_read_timeout     30s;
            add_header Cache-Control "no-store";
        }

        location /health {
            return 200 'nginx ok';
            add_header Content-Type text/plain;
        }

        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
