server:
  port: 8081

spring:
  application:
    name: user-service
  datasource:
    # 主库（写操作：注册、登录写Token）
    url: ${SPRING_DATASOURCE_MASTER_URL:jdbc:mysql://localhost:3307/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      timeout: 3000ms

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.seckill.user.entity
  configuration:
    map-underscore-to-camel-case: true

token:
  expire: 7200

instance:
  id: ${INSTANCE_ID:user-service-local}

logging:
  level:
    com.seckill.user: debug
