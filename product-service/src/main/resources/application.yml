server:
  port: 8082

spring:
  application:
    name: product-service
  # ShardingSphere 读写分离数据源
  shardingsphere:
    datasource:
      names: master,slave
      master:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${SPRING_DATASOURCE_MASTER_URL:jdbc:mysql://localhost:3307/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:123456}
      slave:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        jdbc-url: ${SPRING_DATASOURCE_SLAVE_URL:jdbc:mysql://localhost:3308/seckill?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
        username: ${SPRING_DATASOURCE_USERNAME:root}
        password: ${SPRING_DATASOURCE_PASSWORD:123456}
    rules:
      readwrite-splitting:
        data-sources:
          seckill_rw:
            write-data-source-name: master
            read-data-source-names:
              - slave
            load-balancer-name: round_robin
        load-balancers:
          round_robin:
            type: ROUND_ROBIN
    props:
      sql-show: true
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      timeout: 3000ms
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.seckill.product.entity
  configuration:
    map-underscore-to-camel-case: true

cache:
  product:
    ttl: 3600
    null-ttl: 60
    lock-ttl: 10

instance:
  id: ${INSTANCE_ID:product-service-local}

logging:
  level:
    com.seckill.product: debug
    org.apache.shardingsphere: info
